name: Database migrate

# Apply committed Drizzle migrations to production Postgres after code lands on main.
# Add repository secret DATABASE_URL (Neon connection string, same as Vercel production).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: db-migrate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Drizzle migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          npm run db:migrate
